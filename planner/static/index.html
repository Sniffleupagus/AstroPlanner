<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AstroPlanner</title>
  <script charset="utf-8"
          src="https://cdn.plot.ly/plotly-3.5.0.min.js"
          integrity="sha256-fHbNLP+GlIXN+efbQec78UkemUz3NJp7UmfGxC1tNxs="
          crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; }
    body {
      background: #0a0a2e; color: #fff; font-family: sans-serif;
      display: flex; flex-direction: column; overflow: hidden;
    }
    #toolbar {
      flex: 0 0 auto;
      display: flex; gap: 8px; padding: 8px 16px;
      background: #0a0a2e; border-bottom: 1px solid rgba(255,255,255,0.15);
      align-items: center;
    }
    #toolbar button {
      padding: 8px 20px; border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px; background: transparent; color: #fff;
      font-size: 18px; cursor: pointer; transition: background 0.15s;
    }
    #toolbar button:hover { background: rgba(255,255,255,0.1); }
    #toolbar button.active {
      background: rgba(78,205,196,0.3); border-color: #4ecdc4;
    }
    #toolbar .spacer { flex: 1; }
    #horizon-select {
      padding: 6px 10px; border-radius: 4px; font-size: 16px;
      background: #1a1a4e; color: #fff; border: 1px solid rgba(255,255,255,0.3);
      cursor: pointer;
    }
    #skymap { flex: 1 1 auto; min-height: 0; }
    #status {
      position: fixed; bottom: 12px; right: 16px;
      color: rgba(255,255,255,0.4); font-size: 18px; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="btn-sky" class="active" onclick="switchView('sky')">Sky Coverage</button>
    <button id="btn-horizon" onclick="switchView('horizon')">Horizon View</button>
    <button onclick="location.href='/stacks.html'">Stacks</button>
    <span class="spacer"></span>
    <select id="horizon-select" onchange="selectHorizon(this.value)" title="Choose horizon / location">
      <option value="">No horizon</option>
    </select>
    <button id="btn-reload" onclick="reloadHorizon()" title="Reload horizon masks from server">&#x21bb; Horizon</button>
  </div>
  <div id="skymap"></div>
  <div id="status">Loading…</div>

  <script>
  'use strict';

  // ── Constants ─────────────────────────────────────────────────────────────
  const SCOPE_PALETTE = [
    '#4ecdc4', '#ff6b6b', '#ffd93d', '#a855f7',
    '#f97316', '#06b6d4', '#84cc16', '#ec4899',
  ];

  function scopeColors(records) {
    const scopes = [...new Set(records.map(r => r.scope).filter(Boolean))].sort();
    const map = {};
    scopes.forEach((s, i) => { map[s] = SCOPE_PALETTE[i % SCOPE_PALETTE.length]; });
    return map;
  }

  const D2R = Math.PI/180, R2D = 180/Math.PI;
  const NR = 180, ND = 90;
  const raG  = Array.from({length: NR}, (_, i) => i * 360 / NR);
  const decG = Array.from({length: ND}, (_, i) => -90 + i * 180 / (ND - 1));

  const TARGET_COLORS = [
    '#ff6b6b','#ffd93d','#a855f7','#f97316',
    '#06b6d4','#84cc16','#ec4899','#34d399',
  ];

  // ── State ─────────────────────────────────────────────────────────────────
  let RECORDS = [];
  let LAT = null, LON = null;
  let ALL_HORIZONS = [];
  let activeHorizonIdx = -1;
  let NUM_BASE = 0, NUM_BASE_HZ = 0;
  let currentView = 'sky';
  let selectedTarget = null;
  let refreshTimer = null;
  let TARGET_LIST = [];
  let targetVisibility = {};

  // ── Shared utilities ──────────────────────────────────────────────────────
  function cl(v) { return v < -1 ? -1 : v > 1 ? 1 : v; }

  function sunPos(dt) {
    const J = dt.getTime()/864e5 + 2440587.5, n = J - 2451545;
    const L = ((280.46 + .9856474*n) % 360 + 360) % 360;
    const g = ((357.528 + .9856003*n) % 360 + 360) % 360 * D2R;
    const lam = (L + 1.915*Math.sin(g) + .02*Math.sin(2*g)) * D2R;
    const eps = (23.439 - 4e-7*n) * D2R;
    return {
      ra:  ((Math.atan2(Math.cos(eps)*Math.sin(lam), Math.cos(lam))*R2D) + 360) % 360,
      dec: Math.asin(cl(Math.sin(eps)*Math.sin(lam))) * R2D,
    };
  }

  function lst(dt) {
    const J = dt.getTime()/864e5 + 2440587.5, n = J - 2451545, T = n/36525;
    const g = 280.46061837 + 360.98564736629*n + 3.87933e-4*T*T - T*T*T/3.871e7;
    return ((g + LON) % 360 + 360) % 360;
  }

  function rd2aa(r, d, L) {
    const h = (L-r)*D2R, dc = d*D2R, la = LAT*D2R;
    const sa = Math.sin(dc)*Math.sin(la) + Math.cos(dc)*Math.cos(la)*Math.cos(h);
    const alt = Math.asin(cl(sa)), ca = Math.cos(alt);
    if (Math.abs(ca) < 1e-10) return {alt: alt*R2D, az: 0};
    const cz = (Math.sin(dc) - Math.sin(la)*sa) / (Math.cos(la)*ca);
    let az = Math.acos(cl(cz));
    if (Math.sin(h) > 0) az = 2*Math.PI - az;
    return {alt: alt*R2D, az: az*R2D};
  }

  function aa2rd(a, z, L) {
    const al = a*D2R, az = z*D2R, la = LAT*D2R;
    const sd = Math.sin(al)*Math.sin(la) + Math.cos(al)*Math.cos(la)*Math.cos(az);
    const dc = Math.asin(cl(sd)), cd = Math.cos(dc);
    if (Math.abs(cd) < 1e-10) return {ra: 0, dec: dc*R2D};
    const cH = (Math.sin(al) - Math.sin(la)*sd) / (Math.cos(la)*cd);
    let H = Math.acos(cl(cH));
    if (Math.sin(az) > 0) H = 2*Math.PI - H;
    return {ra: ((L - H*R2D) % 360 + 360) % 360, dec: dc*R2D};
  }

  function sep(r1, d1, r2, d2) {
    const a = Math.sin((d1-d2)*D2R/2), b = Math.sin((r1-r2)*D2R/2);
    return 2*Math.asin(Math.sqrt(Math.max(0, Math.min(1,
      a*a + Math.cos(d1*D2R)*Math.cos(d2*D2R)*b*b)))) * R2D;
  }

  function mAlt(az) {
    const h = ALL_HORIZONS[activeHorizonIdx];
    if (!h || !h.boundary.length) return 0;
    az = ((az % 360) + 360) % 360;
    const b = h.boundary, n = b.length;
    let i = 0;
    for (; i < n; i++) if (b[i].azimuth > az) break;
    const hi = i % n, lo = (i - 1 + n) % n;
    const s = ((b[hi].azimuth - b[lo].azimuth) % 360 + 360) % 360;
    if (!s) return b[lo].min_altitude;
    return b[lo].min_altitude
      + (((az - b[lo].azimuth) % 360 + 360) % 360) / s
      * (b[hi].min_altitude - b[lo].min_altitude);
  }

  function fmtExp(sec) {
    if (sec < 60)   return sec.toFixed(0) + 's';
    if (sec < 3600) return (sec / 60).toFixed(1) + 'm';
    return (sec / 3600).toFixed(1) + 'h';
  }

  function raToHMS(deg) {
    const h = deg / 15, hours = Math.floor(h), min = Math.floor((h - hours) * 60);
    return String(hours).padStart(2,'0') + 'h' + String(min).padStart(2,'0') + 'm';
  }

  function cardinalDir(az) {
    const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE',
                  'S','SSW','SW','WSW','W','WNW','NW','NNW'];
    return dirs[Math.round(az / 22.5) % 16];
  }

  function fmtTime(dt) {
    return dt.toLocaleTimeString([], {hour: 'numeric', minute: '2-digit'});
  }

  // ── Layouts ───────────────────────────────────────────────────────────────
  const LAYOUT_SKY = {
    title: { text: 'Sky Coverage — All Captures', font: { size: 24 } },
    xaxis: {
      title: { text: 'RA (degrees)', font: { size: 18 } },
      range: [360, 0], dtick: 30,
      ticktext: Array.from({length: 13}, (_, i) => i*2 + 'h'),
      tickvals:  Array.from({length: 13}, (_, i) => i * 30),
      tickfont: { size: 16 },
      gridcolor: 'rgba(255,255,255,0.1)',
    },
    yaxis: {
      title: { text: 'DEC (degrees)', font: { size: 18 } },
      range: [-90, 90], dtick: 15,
      tickfont: { size: 16 },
      gridcolor: 'rgba(255,255,255,0.1)',
    },
    plot_bgcolor: '#0a0a2e', paper_bgcolor: '#0a0a2e',
    font: { color: 'white', size: 16 },
    legend: { bgcolor: 'rgba(0,0,0,0.5)', font: { size: 18 } },
    margin: { l: 80, r: 30, t: 80, b: 70 },
  };

  const LAYOUT_HORIZON = {
    title: { text: 'Horizon View', font: { size: 24 } },
    xaxis: {
      title: { text: 'Azimuth', font: { size: 18 } },
      range: [0, 360], dtick: 45,
      ticktext: ['N','NE','E','SE','S','SW','W','NW','N'],
      tickvals: [0, 45, 90, 135, 180, 225, 270, 315, 360],
      tickfont: { size: 16 },
      gridcolor: 'rgba(255,255,255,0.1)',
    },
    yaxis: {
      title: { text: 'Altitude (°)', font: { size: 18 } },
      range: [0, 90], dtick: 10,
      tickfont: { size: 16 },
      gridcolor: 'rgba(255,255,255,0.1)',
    },
    plot_bgcolor: '#0a0a2e', paper_bgcolor: '#0a0a2e',
    font: { color: 'white', size: 16 },
    legend: { bgcolor: 'rgba(0,0,0,0.5)', font: { size: 18 } },
    margin: { l: 80, r: 30, t: 80, b: 70 },
  };

  // ── Sky Coverage view ─────────────────────────────────────────────────────
  function buildTraces(records) {
    const byScope = {};
    for (const r of records) {
      (byScope[r.scope] = byScope[r.scope] || []).push(r);
    }
    const traces = [];
    const colors = scopeColors(records);
    for (const [scope, color] of Object.entries(colors)) {
      const recs = byScope[scope];
      if (!recs || !recs.length) continue;
      const maxExp = Math.max(...recs.map(r => r.total_exposure_sec), 1);
      traces.push({
        x: recs.map(r => r.ra_deg),
        y: recs.map(r => r.dec_deg),
        type: 'scatter', mode: 'markers', name: scope,
        marker: {
          color, opacity: 0.7,
          size: recs.map(r => Math.max(6, Math.min(40, 6 + 34 * r.total_exposure_sec / maxExp))),
          line: { width: 1, color: 'white' },
        },
        text: recs.map(r =>
          '<b>' + r.target + '</b><br>' +
          'RA: ' + raToHMS(r.ra_deg) + ' (' + r.ra_deg.toFixed(2) + '°)<br>' +
          'DEC: ' + (r.dec_deg >= 0 ? '+' : '') + r.dec_deg.toFixed(2) + '°<br>' +
          'Frames: ' + r.num_frames + '<br>' +
          'Exposure: ' + fmtExp(r.total_exposure_sec) + '<br>' +
          'Filter: ' + r.filter_name + '<br>' +
          'Gain: ' + r.gain + '<br>' +
          'Date: ' + ((r.date_obs || '').slice(0,10) || '?') + '<br>' +
          (r.is_mosaic ? 'MOSAIC' : 'Single')
        ),
        hoverinfo: 'text',
      });
    }
    return traces;
  }

  function renderSkyView() {
    const traces = buildTraces(RECORDS);
    Plotly.newPlot('skymap', traces, LAYOUT_SKY, {responsive: true});
    NUM_BASE = document.getElementById('skymap').data.length;
    if (LAT !== null) setTimeout(refreshSky, 200);
  }

  function refreshSky() {
    if (LAT === null || currentView !== 'sky') return;
    const div = document.getElementById('skymap');
    const n = div.data.length;
    if (n > NUM_BASE) {
      const d = [];
      for (let i = NUM_BASE; i < n; i++) d.push(i);
      Plotly.deleteTraces(div, d);
    }
    const now = new Date(), L = lst(now), sun = sunPos(now);
    const hZ = [], sZ = [];
    for (let j = 0; j < ND; j++) {
      const hr = [], sr = [];
      for (let i = 0; i < NR; i++) {
        const aa = rd2aa(raG[i], decG[j], L);
        if (aa.alt < mAlt(aa.az)) { hr.push(1); sr.push(null); }
        else {
          hr.push(null);
          const sp = sep(raG[i], decG[j], sun.ra, sun.dec);
          sr.push(sp < 60 ? 1 - sp/60 : null);
        }
      }
      hZ.push(hr); sZ.push(sr);
    }
    const pts = [];
    for (let az = 0; az < 360; az++) pts.push(aa2rd(mAlt(az), az, L));
    const lR = [], lD = [];
    for (let i = 0; i < pts.length; i++) {
      if (i > 0 && Math.abs(pts[i].ra - pts[i-1].ra) > 300) { lR.push(null); lD.push(null); }
      lR.push(pts[i].ra); lD.push(pts[i].dec);
    }
    Plotly.addTraces(div, [
      { x: raG, y: decG, z: hZ, type: 'heatmap',
        colorscale: [[0,'rgba(60,40,15,0.55)'],[1,'rgba(60,40,15,0.55)']],
        showscale: false, hoverinfo: 'skip', zmin: 0, zmax: 1 },
      { x: raG, y: decG, z: sZ, type: 'heatmap',
        colorscale: [[0,'rgba(255,220,50,0.02)'],[0.4,'rgba(255,180,30,0.15)'],
                     [0.7,'rgba(255,140,20,0.3)'],[1,'rgba(255,100,0,0.45)']],
        showscale: false, hoverinfo: 'skip', zmin: 0, zmax: 1 },
      { x: [sun.ra], y: [sun.dec], type: 'scatter', mode: 'markers',
        name: 'Sun', showlegend: true,
        marker: { size: 16, color: '#FFD700', symbol: 'circle',
                  line: { width: 2, color: '#FF8C00' } },
        hovertext: 'Sun  RA ' + sun.ra.toFixed(1) + '°  Dec ' + sun.dec.toFixed(1) + '°',
        hoverinfo: 'text' },
      { x: lR, y: lD, type: 'scatter', mode: 'lines',
        name: 'Horizon', showlegend: true,
        line: { color: 'rgba(255,100,50,0.8)', width: 2, dash: 'dot' },
        hoverinfo: 'skip' },
    ]);
    const ts = now.toLocaleTimeString();
    Plotly.relayout(div, { 'title.text':
      'Sky Coverage — All Captures<br>' +
      '<sup style="color:rgba(255,255,255,0.4);font-weight:normal">' +
      'Overlays at ' + ts + ' (auto-refresh 5 min)</sup>'
    });
    document.getElementById('status').textContent = 'Updated ' + ts;
  }

  // ── Horizon view ──────────────────────────────────────────────────────────
  function computeTrack(ra, dec, name) {
    const now = new Date();
    const pts = [];
    for (let m = -720; m <= 720; m += 2) {
      const dt = new Date(now.getTime() + m * 60000);
      const L = lst(dt);
      const aa = rd2aa(ra, dec, L);
      const hAlt = mAlt(aa.az);
      pts.push({az: aa.az, alt: aa.alt, time: dt, hAlt: hAlt});
    }

    const pathAz = [], pathAlt = [], pathHover = [];
    let prevAz = null;
    for (let i = 0; i < pts.length; i++) {
      const p = pts[i];
      if (p.alt <= 0) {
        if (pathAz.length && pathAz[pathAz.length - 1] !== null) {
          pathAz.push(null); pathAlt.push(null); pathHover.push('');
        }
        prevAz = null;
        continue;
      }
      if (prevAz !== null && Math.abs(p.az - prevAz) > 180) {
        pathAz.push(null); pathAlt.push(null); pathHover.push('');
      }
      prevAz = p.az;
      pathAz.push(p.az);
      pathAlt.push(p.alt);
      pathHover.push(
        name + '<br>' +
        fmtTime(p.time) + '<br>' +
        cardinalDir(p.az) + ' Az ' + p.az.toFixed(1) + '° Alt ' + p.alt.toFixed(1) + '°'
      );
    }

    let transit = null;
    for (let i = 0; i < pts.length; i++) {
      if (pts[i].alt > 0 && (!transit || pts[i].alt > transit.alt)) {
        transit = pts[i];
      }
    }

    const crossings = [];
    for (let i = 1; i < pts.length; i++) {
      const prev = pts[i - 1], curr = pts[i];
      if (prev.alt <= 0 && curr.alt <= 0) continue;
      const prevVis = prev.alt > 0 && prev.alt >= prev.hAlt;
      const currVis = curr.alt > 0 && curr.alt >= curr.hAlt;
      if (prevVis !== currVis) {
        const cp = currVis ? curr : prev;
        crossings.push({
          az: cp.az, alt: Math.max(cp.alt, cp.hAlt),
          time: cp.time,
          type: currVis ? 'rise' : 'set'
        });
      }
    }

    return {pathAz, pathAlt, pathHover, transit, crossings};
  }

  function drawPath() {
    const div = document.getElementById('skymap');

    const toRemove = [];
    for (let i = div.data.length - 1; i >= 0; i--) {
      if (div.data[i]._isPath) toRemove.push(i);
    }
    if (toRemove.length) Plotly.deleteTraces(div, toRemove);
    Plotly.relayout(div, {annotations: []});

    if (!selectedTarget) return;

    const tgt = selectedTarget.name;
    const track = computeTrack(selectedTarget.ra, selectedTarget.dec, tgt);
    if (!track.pathAz.length) return;

    const newTraces = [];
    const annotations = [];

    newTraces.push({
      x: track.pathAz, y: track.pathAlt,
      type: 'scatter', mode: 'lines',
      line: {color: 'rgba(255,255,255,0.4)', width: 1.5, dash: 'dot'},
      name: tgt + ' track',
      showlegend: true,
      text: track.pathHover, hoverinfo: 'text',
      _isPath: true
    });

    if (track.transit) {
      newTraces.push({
        x: [track.transit.az], y: [track.transit.alt],
        type: 'scatter', mode: 'markers',
        marker: {size: 14, color: '#FFD700', symbol: 'star'},
        showlegend: false,
        hovertext: ['Transit: ' + fmtTime(track.transit.time) + '<br>Alt ' + track.transit.alt.toFixed(1) + '°'],
        hoverinfo: 'text',
        _isPath: true
      });
      annotations.push({
        x: track.transit.az, y: track.transit.alt,
        text: fmtTime(track.transit.time),
        showarrow: true, arrowhead: 0, arrowcolor: '#FFD700',
        ax: 0, ay: -25,
        font: {color: '#FFD700', size: 16},
        bgcolor: 'rgba(0,0,0,0.6)', borderpad: 3
      });
    }

    if (track.crossings.length) {
      const cAz = [], cAlt = [], cHover = [], cColors = [];
      for (const c of track.crossings) {
        const color = c.type === 'rise' ? '#4ecdc4' : '#ff6b6b';
        cAz.push(c.az);
        cAlt.push(c.alt);
        cColors.push(color);
        cHover.push((c.type === 'rise' ? 'Rises' : 'Sets') + ': ' + fmtTime(c.time));
        annotations.push({
          x: c.az, y: c.alt,
          text: (c.type === 'rise' ? '▲ ' : '▼ ') + fmtTime(c.time),
          showarrow: true, arrowhead: 0, arrowcolor: color,
          ax: 0, ay: -25,
          font: {color: color, size: 16},
          bgcolor: 'rgba(0,0,0,0.6)', borderpad: 3
        });
      }
      newTraces.push({
        x: cAz, y: cAlt,
        type: 'scatter', mode: 'markers',
        marker: {size: 10, color: cColors, symbol: 'diamond'},
        showlegend: false,
        hovertext: cHover, hoverinfo: 'text',
        _isPath: true
      });
    }

    if (newTraces.length) Plotly.addTraces(div, newTraces);
    if (annotations.length) Plotly.relayout(div, {annotations: annotations});
  }

  function renderHorizonView() {
    const staticTraces = [];
    const h = ALL_HORIZONS[activeHorizonIdx];
    if (h) {
      const azArr = [], altArr = [];
      for (let a = 0; a <= 360; a++) {
        azArr.push(a);
        altArr.push(mAlt(a));
      }
      staticTraces.push({
        x: azArr, y: altArr,
        fill: 'tozeroy',
        fillcolor: 'rgba(78,205,196,0.18)',
        line: { color: '#4ecdc4', width: 2 },
        name: h.label,
        hoverinfo: 'skip'
      });
    }
    NUM_BASE_HZ = staticTraces.length;
    Plotly.newPlot('skymap', staticTraces, LAYOUT_HORIZON, {responsive: true});

    document.getElementById('skymap').on('plotly_click', function(data) {
      const pt = data.points[0];
      if (!pt.customdata) return;
      const ra = pt.customdata[0], dec = pt.customdata[1], name = pt.customdata[2];
      if (selectedTarget && selectedTarget.ra === ra && selectedTarget.dec === dec) {
        selectedTarget = null;
      } else {
        selectedTarget = {ra: ra, dec: dec, name: name};
      }
      drawPath();
    });

    document.getElementById('skymap').on('plotly_legendclick', function(e) {
      const trace = document.getElementById('skymap').data[e.curveNumber];
      if (trace._targetId) {
        const willHide = trace.visible === true || trace.visible === undefined;
        targetVisibility[trace._targetId] = !willHide;
      }
    });

    refreshHorizon();
  }

  function refreshHorizon() {
    if (LAT === null || currentView !== 'horizon') return;
    const div = document.getElementById('skymap');
    const n = div.data.length;
    if (n > NUM_BASE_HZ) {
      const d = [];
      for (let i = NUM_BASE_HZ; i < n; i++) d.push(i);
      Plotly.deleteTraces(div, d);
    }

    const now = new Date(), L = lst(now), sun = sunPos(now);
    const sunAA = rd2aa(sun.ra, sun.dec, L);

    const byScope = {};
    for (const r of RECORDS) {
      const aa = rd2aa(r.ra_deg, r.dec_deg, L);
      if (aa.alt < 0) continue;
      const scope = r.scope || 'Unknown';
      if (!byScope[scope]) byScope[scope] = [];
      byScope[scope].push({
        target: r.target, az: aa.az, alt: aa.alt,
        total_exposure_sec: r.total_exposure_sec,
        num_frames: r.num_frames,
        filter_name: r.filter_name,
        ra_deg: r.ra_deg, dec_deg: r.dec_deg
      });
    }

    const newTraces = [];
    const colors = scopeColors(RECORDS);
    for (const [scope, color] of Object.entries(colors)) {
      const recs = byScope[scope];
      if (!recs || !recs.length) continue;
      let maxExp = 1;
      for (const rc of recs) if (rc.total_exposure_sec > maxExp) maxExp = rc.total_exposure_sec;

      const xv = [], yv = [], sz = [], txt = [], cd = [];
      for (const rc of recs) {
        xv.push(rc.az);
        yv.push(rc.alt);
        sz.push(Math.max(8, Math.min(30, 8 + 22 * rc.total_exposure_sec / maxExp)));
        txt.push(
          '<b>' + rc.target + '</b><br>' +
          cardinalDir(rc.az) + ' Az ' + rc.az.toFixed(1) + '°  Alt ' + rc.alt.toFixed(1) + '°<br>' +
          'Frames: ' + rc.num_frames + '<br>' +
          'Exposure: ' + fmtExp(rc.total_exposure_sec) + '<br>' +
          'Filter: ' + rc.filter_name
        );
        cd.push([rc.ra_deg, rc.dec_deg, rc.target]);
      }
      newTraces.push({
        x: xv, y: yv,
        customdata: cd,
        type: 'scatter', mode: 'markers', name: scope,
        marker: { color: color, opacity: 0.8, size: sz,
                  line: { width: 1, color: 'white' } },
        text: txt, hoverinfo: 'text'
      });
    }

    if (sunAA.alt > -2) {
      newTraces.push({
        x: [sunAA.az], y: [Math.max(0, sunAA.alt)],
        type: 'scatter', mode: 'markers',
        name: 'Sun', showlegend: true,
        marker: { size: 18, color: '#FFD700', symbol: 'circle',
                  line: { width: 2, color: '#FF8C00' } },
        hovertext: 'Sun  ' + cardinalDir(sunAA.az) +
                   ' Az ' + sunAA.az.toFixed(1) + '° Alt ' + sunAA.alt.toFixed(1) + '°',
        hoverinfo: 'text'
      });
    }

    for (let ti = 0; ti < TARGET_LIST.length; ti++) {
      const tgt = TARGET_LIST[ti];
      const label = tgt.id + (tgt.name ? ' (' + tgt.name + ')' : '');
      const color = TARGET_COLORS[ti % TARGET_COLORS.length];
      const track = computeTrack(tgt.ra, tgt.dec, label);
      if (!track.pathAz.length) continue;
      const vis = targetVisibility[tgt.id] === false ? 'legendonly' : true;
      newTraces.push({
        x: track.pathAz, y: track.pathAlt,
        type: 'scatter', mode: 'lines',
        line: {color: color, width: 2},
        name: label,
        showlegend: true,
        visible: vis,
        text: track.pathHover, hoverinfo: 'text',
        _targetId: tgt.id
      });
    }

    if (newTraces.length) Plotly.addTraces(div, newTraces);

    const ts = now.toLocaleTimeString();
    let aboveCount = 0;
    for (const k in byScope) aboveCount += byScope[k].length;
    Plotly.relayout(div, { 'title.text':
      'Horizon View — ' + aboveCount + ' targets above horizon<br>' +
      '<sup style="color:rgba(255,255,255,0.4);font-weight:normal">' +
      ts + ' (auto-refresh 5 min)</sup>'
    });
    document.getElementById('status').textContent = 'Updated ' + ts;
    drawPath();
  }

  // ── View switching ────────────────────────────────────────────────────────
  function switchView(view) {
    if (view === currentView) return;
    currentView = view;
    document.getElementById('btn-sky').classList.toggle('active', view === 'sky');
    document.getElementById('btn-horizon').classList.toggle('active', view === 'horizon');
    if (refreshTimer) clearInterval(refreshTimer);
    renderCurrentView();
  }

  function renderCurrentView() {
    if (currentView === 'sky') {
      renderSkyView();
      refreshTimer = setInterval(refreshSky, 300000);
    } else {
      renderHorizonView();
      refreshTimer = setInterval(refreshHorizon, 300000);
    }
  }

  function buildHorizonDropdown() {
    const sel = document.getElementById('horizon-select');
    const prevVal = sel.value;
    sel.innerHTML = '<option value="">No horizon</option>';
    for (let i = 0; i < ALL_HORIZONS.length; i++) {
      const opt = document.createElement('option');
      opt.value = String(i);
      opt.textContent = ALL_HORIZONS[i].label;
      sel.appendChild(opt);
    }
    if (activeHorizonIdx >= 0) sel.value = String(activeHorizonIdx);
  }

  function selectHorizon(val) {
    activeHorizonIdx = val === '' ? -1 : parseInt(val, 10);
    const h = ALL_HORIZONS[activeHorizonIdx];
    if (h) {
      LAT = h.lat;
      LON = h.lon;
    }
    if (refreshTimer) clearInterval(refreshTimer);
    renderCurrentView();
  }

  function loadHorizonsData(horizons) {
    const prevFilename = activeHorizonIdx >= 0
      ? ALL_HORIZONS[activeHorizonIdx].filename : null;

    ALL_HORIZONS = horizons.map(h => ({
      filename: h.filename,
      label: h.name,
      boundary: h.boundary,
      lat: h.lat,
      lon: h.lon,
    }));

    activeHorizonIdx = 0;
    if (prevFilename) {
      const found = ALL_HORIZONS.findIndex(h => h.filename === prevFilename);
      if (found >= 0) activeHorizonIdx = found;
    }

    const h = ALL_HORIZONS[activeHorizonIdx];
    if (h) { LAT = h.lat; LON = h.lon; }
    buildHorizonDropdown();
  }

  async function reloadHorizon() {
    const status = document.getElementById('status');
    status.textContent = 'Reloading horizons…';
    try {
      const horizons = await fetch('/api/horizons').then(r => r.json());
      if (horizons.length) {
        loadHorizonsData(horizons);
        status.textContent = horizons.length + ' horizon(s) loaded';
        if (refreshTimer) clearInterval(refreshTimer);
        renderCurrentView();
      } else {
        status.textContent = 'No horizon data available';
      }
    } catch(e) {
      status.textContent = 'Reload failed: ' + e.message;
    }
  }

  // ── Bootstrap ─────────────────────────────────────────────────────────────
  async function init() {
    const status = document.getElementById('status');
    try {
      const [records, horizons, targetsData] = await Promise.all([
        fetch('/api/captures').then(r => { if (!r.ok) throw new Error(r.statusText); return r.json(); }),
        fetch('/api/horizons').then(r => r.json()),
        fetch('/api/targets').then(r => r.json()),
      ]);

      RECORDS = records;
      if (horizons.length) {
        loadHorizonsData(horizons);
      }
      TARGET_LIST = targetsData.targets || [];
      for (const t of TARGET_LIST) targetVisibility[t.id] = true;
      status.textContent = records.length + ' captures, ' + TARGET_LIST.length + ' targets loaded';
      renderCurrentView();
    } catch(e) {
      status.textContent = 'Error: ' + e.message;
      console.error(e);
    }
  }

  init();
  </script>
</body>
</html>
